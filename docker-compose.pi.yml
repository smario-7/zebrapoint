version: "3.9"

services:

  backend:
    image: ghcr.io/TWOJ_GITHUB_USER/zebrapoint-backend:latest
    container_name: zebrapoint_backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - model_cache:/root/.cache
    networks:
      - zebrapoint_net
    mem_limit: 1200m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/TWOJ_GITHUB_USER/zebrapoint-frontend:latest
    container_name: zebrapoint_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - zebrapoint_net
    mem_limit: 128m
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: zebrapoint_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - zebrapoint_net
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    container_name: zebrapoint_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - zebrapoint_net
    mem_limit: 160m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    image: ghcr.io/TWOJ_GITHUB_USER/zebrapoint-backend:latest
    container_name: zebrapoint_worker
    restart: unless-stopped
    env_file:
      - .env
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=1
      --queues=ml,notifications,default
      --hostname=worker@zebrapoint
    volumes:
      - model_cache:/root/.cache
    networks:
      - zebrapoint_net
    mem_limit: 1200m
    depends_on:
      redis:
        condition: service_healthy

  beat:
    image: ghcr.io/TWOJ_GITHUB_USER/zebrapoint-backend:latest
    container_name: zebrapoint_beat
    restart: unless-stopped
    env_file:
      - .env
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /tmp/celerybeat-schedule
    networks:
      - zebrapoint_net
    mem_limit: 256m
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

networks:
  zebrapoint_net:
    driver: bridge

volumes:
  model_cache:
    driver: local
  redis_data:
    driver: local
