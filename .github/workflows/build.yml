name: Build & Push ARM64 Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/zebrapoint-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/zebrapoint-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test-secret-key-ci
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          cd backend
          pytest -v

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm run test -- --run

  build-and-push:
    name: Build & Push ARM64
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set frontend URLs from PRODUCTION_BASE_URL
        run: |
          BASE="${{ secrets.PRODUCTION_BASE_URL }}"
          echo "VITE_API_URL=${BASE}/api" >> $GITHUB_ENV
          echo "VITE_WS_URL=wss://${BASE#*://}" >> $GITHUB_ENV

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context:   ./backend
          file:      ./backend/Dockerfile.pi
          platforms: linux/arm64
          push:      true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context:   ./frontend
          file:      ./frontend/Dockerfile.pi
          platforms: linux/arm64
          push:      true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ env.VITE_API_URL }}
            VITE_WS_URL=${{ env.VITE_WS_URL }}

      - name: Summary
        run: |
          echo "## ✅ Obrazy gotowe na ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Obraz | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| backend  | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Aby wdrożyć na Pi, uruchom:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd ~/zebrapoint && docker compose -f docker-compose.pi.yml pull && docker compose -f docker-compose.pi.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
