name: 🐳 Build & Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY:       ghcr.io
  BACKEND_IMAGE:  ghcr.io/${{ github.repository_owner }}/zebrapoint-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/zebrapoint-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  test:
    name: 🧪 Testy
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test-secret-key-ci
      PYTHONUTF8: 1
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Testy backendu
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
          pytest -v --tb=short

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Testy frontendu
        run: |
          cd frontend
          npm ci
          npm run test -- --run

  build-backend:
    name: 🐳 Build Backend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          platforms:  linux/amd64
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  build-frontend:
    name: 🎨 Build Frontend
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          platforms:  linux/amd64
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=https://zebrapoint.net/api
            VITE_WS_URL=wss://zebrapoint.net
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  summary:
    name: 📋 Podsumowanie
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: success()
    steps:
      - name: Podsumowanie
        run: |
          echo "## ✅ Obrazy gotowe na ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Obrazy dostępne do pobrania na serwerze:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cd ~/zebrapoint" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.prod.yml pull" >> $GITHUB_STEP_SUMMARY
          echo "docker compose -f docker-compose.prod.yml up -d" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
