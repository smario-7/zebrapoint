events {
    worker_connections 512;
}

http {

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen 80;
        server_name zebrapoint.net www.zebrapoint.net;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS (self-signed — Cloudflare robi prawdziwy SSL) ───────
    server {
        listen 443 ssl;
        http2 on;
        server_name zebrapoint.net www.zebrapoint.net;

        # Self-signed cert — wystarczy dla trybu Cloudflare Full
        ssl_certificate     /etc/ssl/zebrapoint/fullchain.pem;
        ssl_certificate_key /etc/ssl/zebrapoint/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Content-Type-Options  "nosniff"       always;
        add_header X-Frame-Options         "DENY"          always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "no-referrer"   always;

        # ── WebSocket — PRZED /api/ ────────────────────────────────
        location /ws/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $http_cf_connecting_ip;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Backend API ────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;

            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Auth — restrykcyjny limit ──────────────────────────────
        location /api/auth/login {
            limit_req zone=auth burst=10 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_cf_connecting_ip;
        }

        # ── Frontend ───────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
