events {
    worker_connections 256;
}

http {

    server {
        listen 80;
        server_name _;

        # ── WebSocket — MUSI być przed /api/ i / ──────────────────
        # Nginx dopasowuje od najbardziej szczegółowego
        location /ws/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;

            # Te dwa nagłówki są kluczowe dla WebSocket upgrade
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;

            # Długi timeout — połączenia WS żyją długo (czat)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Backend API ────────────────────────────────────────────
        location /api/ {
            # Usuwa prefix /api/ przed przekazaniem do FastAPI
            # /api/auth/login → /auth/login
            rewrite ^/api/(.*) /$1 break;

            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;

            # Dłuższy timeout dla /symptoms/ (model embeddingów)
            proxy_read_timeout 60s;
        }

        # ── Frontend — wszystko pozostałe ─────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }
}
